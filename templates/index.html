<!DOCTYPE html>
<html>

<head>
    <title>News Extractor</title>

    <!-- Mobile scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 15px;
            background: white;
        }

        h2,
        h3 {
            margin-top: 20px;
        }

        .url-box {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        input[type=text] {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 16px;
            font-size: 16px;
            border: none;
            background: #007BFF;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        textarea {
            width: 100%;
            height: 220px;
            margin-top: 10px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
        }

        .copy-btn {
            margin-top: 6px;
            background: #28a745;
        }

        .copy-btn:hover {
            background: #1f7a33;
        }

        /* Mobile improvements */

        @media (max-width: 600px) {

            .url-box {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            textarea {
                height: 180px;
                font-size: 15px;
            }

        }
    </style>

    <script>

        function copyText(id) {

            var copyText = document.getElementById(id);

            copyText.select();
            copyText.setSelectionRange(0, 99999);

            navigator.clipboard.writeText(copyText.value);

        }

    </script>

</head>

<body>

    <div class="container">

        <h2>News Article Extractor</h2>

        <form method="POST">

            <div class="url-box">
                <input type="text" name="url" placeholder="Paste news URL here" required>
                <button type="submit">Extract</button>
            </div>

        </form>


        <h3>Original Text</h3>

        <textarea id="originalText" readonly>{{ article_text }}</textarea>

        <button class="copy-btn" onclick="copyText('originalText')">
            Copy Original Text
        </button>

        <br>


        <h3>English Translation</h3>

        <textarea id="translatedText" readonly>{{ translated_text }}</textarea>

        <button class="copy-btn" onclick="copyText('translatedText')">
            Copy Translation
        </button>


        <br>

        <br>

        <a href="https://translate.google.com/" target="_blank">
            <button style="background:#ff9800;">
                Open Google Translate
            </button>
        </a>

    </div>


    <script>

        var logs = {{ debug_logs | default ([]) | tojson | safe }};

        if (logs.length > 0) {
            console.log("===== SCRAPER DEBUG LOGS =====");

            logs.forEach(function (log) {
                console.log(log);
            });
        }

    </script>


</body>

</html>
